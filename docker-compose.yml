services:
  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - /var/lib/kafka/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  topic_creator:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "/opt/kafka/bin/kafka-topics.sh --create --topic __consumer_offsets --partitions 50 --replication-factor 1 --bootstrap-server kafka:9092; "
    networks:
      - app_network

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 9095:8080
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - app_network

  db_auth:
    image: postgres:12-bullseye
    container_name: postgres_auth_db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - ./docker-data/auth_db:/var/lib/postgresql/data
      - ./auth_service/db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  db_products:
    image: postgres:12-bullseye
    container_name: postgres_products_db
    environment:
      POSTGRES_USER: storage_admin
      POSTGRES_PASSWORD: THw7l0bxvPPkWUhP
      POSTGRES_DB: strg_products_db
    ports:
      - "5436:5432"
    volumes:
      - ./docker-data/products_db:/var/lib/postgresql/data
      - ./products_service/db_init/init_products.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  db_orders:
    image: postgres:12-bullseye
    container_name: postgres_orders_db
    environment:
      POSTGRES_USER: storage_admin
      POSTGRES_PASSWORD: THw7l0bxvPPkWUhP
      POSTGRES_DB: strg_orders_db
    ports:
      - "5437:5432"
    volumes:
      - ./docker-data/orders_db:/var/lib/postgresql/data
      - ./orders_service/db_init/init_orders.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  db_chats:
    image: postgres:12-bullseye
    container_name: postgres_chats_db
    environment:
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: THw7l0bxvPPkWUhP
      POSTGRES_DB: chat_db
    ports:
      - "5440:5432"
    volumes:
      - ./docker-data/chat_db:/var/lib/postgresql/data
      - ./chat_service/db_init/init_chat.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: auth_service
    volumes:
      - ./auth_service/logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://storage_admin:THw7l0bxvPPkWUhP@db_auth:5432/strg_users_db
      SEED_SUPERADMIN_ENABLED: "true"
      SEED_SUPERADMIN_NAME: Super Admin
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD}
      REDIS_HOST: redis
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  products_service:
    build:
      context: ./products_service
      dockerfile: Dockerfile
    container_name: products_service
    volumes:
      - ./products_service/logs:/app/logs
      - ./products_service/uploads:/app/uploads
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://storage_admin:THw7l0bxvPPkWUhP@db_products:5432/strg_products_db
      REDIS_HOST: redis
    ports:
      - "8002:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  orders_service:
    build:
      context: ./orders_service
      dockerfile: Dockerfile
    container_name: orders_service
    volumes:
      - ./orders_service/logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://storage_admin:THw7l0bxvPPkWUhP@db_orders:5432/strg_orders_db
      REDIS_HOST: redis
    ports:
      - "8003:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  chat_service:
    build:
      context: ./chat_service
      dockerfile: Dockerfile
    container_name: chat_service
    volumes:
      - ./chat_service/logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chat_user:THw7l0bxvPPkWUhP@db_chats:5432/chat_db
      REDIS_HOST: redis
    ports:
      - "8004:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512MB
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s
        window: 20s

  frontend_dev:
    image: node:20-alpine
    container_name: storesystem_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_AUTH_API_URL: http://localhost:8001
      VITE_PRODUCTS_API_URL: http://localhost:8002
      VITE_ORDERS_API_URL: http://localhost:8003
      VITE_CHAT_API_URL: http://localhost:8004
      VITE_CHAT_WS_URL: ws://localhost:8004
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - app_network
    profiles:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: /api/auth
        VITE_PRODUCTS_API_URL: /api/products
        VITE_ORDERS_API_URL: /api/orders
        VITE_CHAT_API_URL: /api/chat
        VITE_CHAT_WS_URL: /ws
    container_name: frontend
    expose:
      - "80"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/app/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  reverse_proxy:
    build:
      context: ./deploy/reverse-proxy
      dockerfile: Dockerfile
    container_name: reverse_proxy
    depends_on:
      frontend:
        condition: service_healthy
      auth_service:
        condition: service_healthy
      products_service:
        condition: service_healthy
      orders_service:
        condition: service_healthy
      chat_service:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  frontend_node_modules:
