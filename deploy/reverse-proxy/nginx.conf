map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;

    location = / {
        return 302 /app/login;
    }

    location = /app {
        return 302 /app/;
    }

    location = /products {
        return 302 /app/products;
    }

    location = /suppliers {
        return 302 /app/suppliers;
    }

    location = /warehouses {
        return 302 /app/warehouses;
    }

    location ~ ^/warehouses_detail/(?<warehouse_id>[^/]+)$ {
        return 302 /app/warehouses/$warehouse_id;
    }

    location = /orders {
        return 302 /app/orders;
    }

    location = /cart {
        return 302 /app/cart;
    }

    location = /shipments {
        return 302 /app/shipments;
    }

    location = /pending-approval {
        return 302 /app/pending-approval;
    }

    location = /user-list {
        return 302 /app/user-list;
    }

    location = /admin_orders {
        return 302 /app/admin-orders;
    }

    location = /chat-ui {
        return 302 /app/chat;
    }

    location = /login {
        return 302 /app/login;
    }

    location = /register {
        return 302 /app/register;
    }

    location ^~ /app/ {
        proxy_pass http://frontend:80;
    }

    location ^~ /api/auth/ {
        proxy_pass http://auth_service:8000/;
    }

    location ^~ /api/products/ {
        proxy_pass http://products_service:8000/;
    }

    location ^~ /api/orders/ {
        proxy_pass http://orders_service:8000/;
    }

    location ^~ /api/chat/ {
        proxy_pass http://chat_service:8000/;
    }

    location ^~ /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_pass http://chat_service:8000;
    }

    location / {
        return 302 /app/login;
    }
}
