server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /app/login;
    }

    location ^~ /app/assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        return 404;
    }
}
